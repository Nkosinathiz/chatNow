<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; }

    #join-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }
    #join-screen h1 { font-size: 24px; }
    #join-screen input {
      padding: 10px;
      font-size: 16px;
      width: 260px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #join-screen button {
      padding: 10px 24px;
      font-size: 16px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #chat-screen { display: none; flex-direction: column; height: 100vh; }

    #header {
      background: #000;
      color: #fff;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .message { max-width: 60%; }
    .message .meta { font-size: 12px; color: #888; margin-bottom: 4px; }
    .message .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      background: #fff;
      border: 1px solid #ddd;
      display: inline-block;
    }
    .message.own { align-self: flex-end; text-align: right; }
    .message.own .bubble { background: #000; color: #fff; border: none; }
    .message.system { align-self: center; font-size: 13px; color: #888; font-style: italic; }

    #input-area {
      display: flex;
      padding: 16px;
      gap: 10px;
      background: #fff;
      border-top: 1px solid #ddd;
    }
    #input-area input {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    #input-area button {
      padding: 10px 20px;
      font-size: 16px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Join Screen -->
  <div id="join-screen">
    <h1>Live Chat</h1>
    <input type="text" id="usernameInput" placeholder="Enter your username..." />
    <button onclick="joinChat()">Join</button>
  </div>

  <!-- Chat Screen -->
  <div id="chat-screen">
    <div id="header">Live Chat</div>
    <div id="messages"></div>
    <div id="input-area">
      <input type="text" id="messageInput" placeholder="Type a message..." />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    let username = '';

    function joinChat() {
      username = document.getElementById('usernameInput').value.trim();
      if (!username) return;

      document.getElementById('join-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';

      socket.emit('join', username);
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;

      socket.emit('send_message', text);
      input.value = '';
    }

    // Allow Enter key to send
    document.getElementById('messageInput')?.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    socket.on('message', ({ user, text }) => {
      const messages = document.getElementById('messages');
      const div = document.createElement('div');

      if (user === 'System') {
        div.className = 'message system';
        div.textContent = text;
      } else {
        div.className = `message ${user === username ? 'own' : ''}`;
        div.innerHTML = `
          <div class="meta">${user}</div>
          <div class="bubble">${text}</div>
        `;
      }

      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    });
  </script>
</body>
</html>
